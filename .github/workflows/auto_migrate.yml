name: Auto Migrate Excel to Supabase

on:
  push:
    paths:
      - 'GoTrans-Postgres/data/**' # Robot jalan tiap ada file baru di folder data
  workflow_dispatch: # Biar bisa lu klik "Run" manual kapan aja

jobs:
  run-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Code dari GitHub
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Library Python
        run: |
          pip install pandas sqlalchemy psycopg2-binary openpyxl

      - name: Jalankan Script Migrasi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: python GoTrans-Postgres/migrasi.py
